<svg width="1242" height="2436" viewBox="0 0 1242 2436" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: deep warm charcoal to match the app icon. Premium, calm, intentional. -->
  <rect width="1242" height="2436" fill="#131210"/>

  <!-- Centered T monogram, scaled to feel like a tool mark, not a logo. -->
  <g transform="translate(421 880)">
    <rect width="400" height="76" rx="38" fill="#F4EFE4"/>
    <rect x="162" y="0" width="76" height="400" rx="38" fill="#F4EFE4"/>
    <circle cx="320" cy="320" r="32" fill="#7DBDA9"/>
  </g>

  <!-- Wordmark: deliberately tight, neutral sans feel -->
  <text x="621" y="1470"
        text-anchor="middle"
        fill="#F4EFE4"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="74"
        font-weight="800"
        letter-spacing="-1.4">TradieTrack</text>

  <!-- Subtle accent dot under wordmark, echo of app icon -->
  <circle cx="621" cy="1530" r="4" fill="#7DBDA9"/>

  <!-- Tagline: calm, plain, local-first promise -->
  <text x="621" y="1590"
        text-anchor="middle"
        fill="#8C8474"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32"
        font-weight="500"
        letter-spacing="0">Local jobs. No login.</text>
</svg>
