<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: deep warm charcoal (premium productivity app tone) -->
  <rect width="1024" height="1024" fill="#1A1814"/>
  <!-- Subtle inner edge for tactile depth -->
  <rect x="0.5" y="0.5" width="1023" height="1023" rx="0" stroke="#272320" stroke-width="1"/>

  <!-- T monogram: clean geometric construction -->
  <!-- Horizontal bar of the T -->
  <rect x="304" y="296" width="416" height="76" rx="38" fill="#F4EFE4"/>
  <!-- Vertical stem of the T -->
  <rect x="474" y="296" width="76" height="436" rx="38" fill="#F4EFE4"/>

  <!-- Status accent dot, bottom right, restrained and brand-recognizable -->
  <circle cx="772" cy="772" r="44" fill="#7DBDA9"/>
</svg>
